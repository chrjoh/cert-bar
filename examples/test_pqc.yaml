# Example certificate config demonstrating all six PQC key types.
# Requires OpenSSL >= 3.5 and cert-helper built with `--features pqc`.

certificates:
  - certificate:
      id: "ml-dsa-44"
      parent: ml-dsa-44
      ca: true
      pkix:
        commonname: "ML-DSA-44 Root CA"
        country: "SE"
        organization: "NIST PQC"
      keytype: MlDsa44
      validto: "2027-01-01"

  - certificate:
      id: "ml-dsa-65"
      parent: ml-dsa-65
      ca: true
      pkix:
        commonname: "ML-DSA-65 Root CA"
        country: "FI"
        organization: "NIST PQC Medium"
      keytype: MlDsa65
      validto: "2034-01-01"

  - certificate:
      id: "ml-dsa-87"
      parent: ml-dsa-87
      ca: true
      pkix:
        commonname: "ML-DSA-87 Root CA"
        country: "NO"
        organization: "NIST PQC High"
      keytype: MlDsa87
      validto: "2034-01-01"

  - certificate:
      id: "slh-dsa-sha2-128s"
      parent: slh-dsa-sha2-128s
      ca: true
      pkix:
        commonname: "SLH-DSA-SHA2-128S Root CA"
        country: "SE"
        organization: "NIST PQC SPHINCSplus"
      keytype: SlhDsaSha2_128s
      validto: "2034-01-01"

  - certificate:
      id: "slh-dsa-sha2-192s"
      parent: slh-dsa-sha2-192s
      ca: true
      pkix:
        commonname: "SLH-DSA-SHA2-192S Root CA"
        country: "SE"
        organization: "NIST PQC SPHINCSplus Medium"
      keytype: SlhDsaSha2_192s
      validto: "2034-01-01"

  - certificate:
      id: "slh-dsa-sha2-256s"
      parent: slh-dsa-sha2-256s
      ca: true
      pkix:
        commonname: "SLH-DSA-SHA2-256S Root CA"
        country: "SE"
        organization: "NIST PQC SPHINCSplus High"
      keytype: SlhDsaSha2_256s
      validto: "2034-01-01"
  - certificate:
      id: "child-slh-dsa-sha2-256s"
      parent: slh-dsa-sha2-256s
      ca: false
      pkix:
        commonname: "child-SLH-DSA-SHA2-256S Root CA"
        country: "SE"
        organization: "NIST PQC SPHINCSplus High"
      keytype: SlhDsaSha2_256s
      usage:
        - signature
        - clientauth
        - contentcommitment
      validto: "2034-01-01"
